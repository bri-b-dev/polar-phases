name: release-android

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Debug available secrets
        run: |
          echo "Available secrets:"
          env | grep -i android || echo "No ANDROID_* secrets found"
          echo "---"
          echo "Checking specific secrets:"
          [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && echo "✓ ANDROID_KEYSTORE_BASE64 is set" || echo "✗ ANDROID_KEYSTORE_BASE64 is empty/missing"
          [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && echo "✓ ANDROID_KEYSTORE_PASSWORD is set" || echo "✗ ANDROID_KEYSTORE_PASSWORD is empty/missing"
          [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] && echo "✓ ANDROID_KEY_ALIAS is set" || echo "✗ ANDROID_KEY_ALIAS is empty/missing"
          [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ] && echo "✓ ANDROID_KEY_PASSWORD is set" || echo "✗ ANDROID_KEY_PASSWORD is empty/missing"

      - name: Preflight signing secrets
        shell: bash
        env:
          S_B64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          S_SP:    ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          S_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          S_KP:    ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for v in S_B64 S_SP S_ALIAS S_KP; do
            if [ -z "${!v:-}" ]; then
              echo "❌ Missing required secret: $v"
              exit 1
            fi
          done
          {
            echo "ANDROID_KEYSTORE_BASE64=${S_B64}"
            echo "ANDROID_KEYSTORE_PASSWORD=${S_SP}"
            echo "ANDROID_KEY_ALIAS=${S_ALIAS}"
            echo "ANDROID_KEY_PASSWORD=${S_KP}"
          } >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_BASE64 length: ${#S_B64}"

      - name: Verify keystore decodes & alias exists
        shell: bash
        run: |
          set -euo pipefail
          tmp=keystore.jks
          printf %s "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$tmp"
          keytool -list -keystore "$tmp" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null
          rm -f "$tmp"

      - name: Build signed AAB & APK (Gradle)
        run: |
          ./gradlew clean \
            :app:bundleRelease \
            :app:assembleRelease

      - name: Show build outputs (diagnostics)
        run: |
          echo "=== Built files ==="
          find app/build/outputs -type f \( -name "*.aab" -o -name "*.apk" \) -print || true

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          # AAB
          AAB=$(ls app/build/outputs/bundle/release/*.aab | head -n1)
          cp -f "$AAB" release/app-release.aab
          # APK
          APK=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          cp -f "$APK" release/app-release.apk
          ls -l release

      - name: Upload artifacts (AAB + APK)
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            release/app-release.aab
            release/app-release.apk
          if-no-files-found: error

  github-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: dist

      - name: Release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            printf "Release %s\n" "$GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/app-release.aab
            dist/app-release.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
